name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.13
  MEET_PROD_URL: ${{ vars.MEET_PROD_URL || 'https://meet.celados.com' }}

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_DEPLOY_API_TOKEN }}
        run: bunx wrangler deploy

      - name: Smoke production URL
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 5 "$MEET_PROD_URL" >/dev/null

