name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.13
  MEET_PROD_URL: ${{ vars.MEET_PROD_URL || 'https://meet.celados.com' }}

jobs:
  release-macos:
    name: Build signed notarized macOS release
    runs-on: macos-26
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version
        run: |
          VERSION="$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version)")"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "Tag version $TAG_VERSION does not match package.json version $VERSION" >&2
              exit 1
            fi
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Verify production Web app
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 5 "$MEET_PROD_URL" >/dev/null

      - name: Import Developer ID certificate
        env:
          MACOS_DEVELOPER_ID_CERT_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERT_BASE64 }}
          MACOS_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          if [[ -z "$MACOS_DEVELOPER_ID_CERT_BASE64" || -z "$MACOS_DEVELOPER_ID_CERT_PASSWORD" ]]; then
            echo "Missing MACOS_DEVELOPER_ID_CERT_BASE64 or MACOS_DEVELOPER_ID_CERT_PASSWORD." >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/meet-ai-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          printf '%s' "$MACOS_DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_DEVELOPER_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          current_keychains=()
          while IFS= read -r keychain; do
            [[ -n "$keychain" ]] && current_keychains+=("$keychain")
          done < <(security list-keychains -d user | sed 's/^[[:space:]]*"//; s/"$//')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${current_keychains[@]}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ -z "$APPLE_API_KEY_ID" || -z "$APPLE_API_ISSUER" ]]; then
            echo "Missing APPLE_API_KEY_ID or APPLE_API_ISSUER." >&2
            exit 1
          fi

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          if [[ -n "$APPLE_API_KEY_BASE64" ]]; then
            printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          elif [[ -n "$APPLE_API_KEY" ]]; then
            printf '%s' "$APPLE_API_KEY" > "$API_KEY_PATH"
          else
            echo "Missing APPLE_API_KEY_BASE64 or APPLE_API_KEY." >&2
            exit 1
          fi

          chmod 600 "$API_KEY_PATH"
          {
            echo "APPLE_API_KEY_PATH=$API_KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Build signed notarized desktop app
        env:
          MEET_DESKTOP_SIGN: '1'
          MEET_DESKTOP_NOTARIZE: '1'
        run: bun run desktop:dist

      - name: Verify signed app
        run: |
          APP_PATH="release/desktop/mac-arm64/Meet AI.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -vv --type execute "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Smoke released desktop app
        env:
          MEET_DESKTOP_URL: ${{ env.MEET_PROD_URL }}
          MEET_DESKTOP_APP_PATH: release/desktop/mac-arm64/Meet AI.app/Contents/MacOS/Meet AI
        run: bun desktop/smoke.ts

      - name: Verify DMG
        run: |
          DMG_PATH="$(find release/desktop -maxdepth 1 -name 'Meet AI-*-arm64.dmg' -print -quit)"
          if [[ -z "$DMG_PATH" ]]; then
            echo "No arm64 DMG was produced." >&2
            exit 1
          fi
          hdiutil verify "$DMG_PATH"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meet-ai-desktop-macos-${{ env.APP_VERSION }}
          path: |
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.blockmap
          if-no-files-found: error

      - name: Create draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.blockmap
