name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.13

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build Worker bundle
        run: bun run build

  desktop:
    name: Desktop package smoke
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build unpacked desktop app
        run: bun run desktop:pack

      - name: Smoke test packaged desktop app
        run: |
          set -euo pipefail
          bun run dev -- --host 127.0.0.1 --port 3000 > "$RUNNER_TEMP/meet-ai-web.log" 2>&1 &
          web_pid="$!"
          trap 'kill "$web_pid" 2>/dev/null || true' EXIT

          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000 >/dev/null; then
              MEET_DESKTOP_URL=http://127.0.0.1:3000 bun desktop/smoke.ts
              exit 0
            fi
            sleep 1
          done

          echo "Timed out waiting for local Web app after $attempt attempts."
          cat "$RUNNER_TEMP/meet-ai-web.log"
          exit 1
